spring.application.name=ai-content-detection-backend
server.port=8080

# AI Service Gateway Configuration
ai.service.base-url=http://127.0.0.1:5000
ai.service.predict-endpoint=/predict
ai.service.connect-timeout-ms=10000
ai.service.read-timeout-ms=30000

# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Logging
logging.level.root=INFO
logging.level.com.aicontentdetection=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
