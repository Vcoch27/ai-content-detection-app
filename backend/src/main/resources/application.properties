spring.application.name=ai-content-detection-backend
server.port=${PORT:8080}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://*.vercel.app}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# Database Configuration (AWS RDS MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ai-detect-db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true

# AWS S3 Configuration
aws.region=${AWS_REGION:us-east-1}
aws.bucket-name=${AWS_BUCKET_NAME:ai-detect-images}
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}

# AI Service Gateway Configuration
ai.service.base-url=${AI_SERVICE_URL:http://127.0.0.1:8000}
ai.service.predict-endpoint=/predict
ai.service.connect-timeout-ms=10000
ai.service.read-timeout-ms=30000

# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Logging
logging.level.root=INFO
logging.level.com.aicontentdetection=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
